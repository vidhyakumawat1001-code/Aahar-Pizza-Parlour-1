
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body-wrap {
    font-family: 'DM Sans', sans-serif;
  }

  .gallery-page {
    font-family: 'DM Sans', sans-serif;
    background: var(--color-background-tertiary);
    min-height: 100vh;
    padding-bottom: 3rem;
  }

  .hero {
    background: #1a0a00;
    color: #fff;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 60% 0%, #c0390022 0%, transparent 70%),
                radial-gradient(ellipse at 20% 100%, #8a200011 0%, transparent 60%);
    pointer-events: none;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
    position: relative;
  }

  .hero h1 span {
    color: #f97316;
  }

  .hero p {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    margin-top: 6px;
    position: relative;
  }

  .upload-zone {
    margin: 2rem auto;
    max-width: 680px;
    padding: 0 1rem;
  }

  .upload-card {
    background: var(--color-background-primary);
    border: 1.5px dashed var(--color-border-secondary);
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .upload-card:hover, .upload-card.drag-over {
    border-color: #f97316;
    background: #fff7f0;
  }

  .upload-card.drag-over {
    background: #fff3e8;
  }

  .upload-icon {
    width: 54px;
    height: 54px;
    background: #fff3e8;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
  }

  .upload-icon i {
    font-size: 26px;
    color: #f97316;
  }

  .upload-card h2 {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 6px;
  }

  .upload-card p {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-bottom: 1.2rem;
  }

  .upload-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #f97316;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .upload-btn:hover { background: #ea6c0e; }
  .upload-btn:active { transform: scale(0.97); }

  #fileInput { display: none; }

  .toolbar {
    max-width: 680px;
    margin: 0 auto 1rem;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .photo-count {
    font-size: 13px;
    color: var(--color-text-secondary);
    font-weight: 500;
  }

  .clear-btn {
    font-size: 13px;
    color: #dc2626;
    background: none;
    border: 0.5px solid #fca5a5;
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    display: none;
    align-items: center;
    gap: 5px;
  }

  .clear-btn:hover { background: #fef2f2; }

  .gallery-grid {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 1rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }

  .photo-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 12px;
    overflow: hidden;
    background: var(--color-background-secondary);
    animation: fadeIn 0.35s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .photo-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .photo-item .delete-btn {
    position: absolute;
    top: 7px;
    right: 7px;
    width: 28px;
    height: 28px;
    background: rgba(0,0,0,0.6);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .photo-item:hover .delete-btn { opacity: 1; }

  .photo-item .delete-btn:hover { background: #dc2626; }

  .empty-state {
    max-width: 680px;
    margin: 1rem auto;
    padding: 3rem 1rem;
    text-align: center;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .empty-state i {
    font-size: 40px;
    color: var(--color-text-tertiary);
    margin-bottom: 4px;
  }

  .empty-state p {
    font-size: 14px;
    color: var(--color-text-secondary);
  }

  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 92vw;
    max-height: 80vh;
    border-radius: 10px;
    object-fit: contain;
  }

  .lightbox-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lightbox-close:hover { background: rgba(255,255,255,0.25); }

  .success-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a0a00;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
    pointer-events: none;
  }

  .success-toast.show { transform: translateX(-50%) translateY(0); }
</style>

<div class="gallery-page">
  <div class="hero">
    <h1>🍕 Aahar <span>Gallery</span></h1>
    <p>Upload your favourite moments from the parlour</p>
  </div>

  <div class="upload-zone">
    <div class="upload-card" id="dropZone">
      <div class="upload-icon">
        <i class="ti ti-camera" aria-hidden="true"></i>
      </div>
      <h2>Add photos from your gallery</h2>
      <p>Tap the button below or drag &amp; drop images here</p>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
        <i class="ti ti-photo" aria-hidden="true"></i>
        Choose from Gallery
      </button>
      <input type="file" id="fileInput" accept="image/*" multiple />
    </div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none;">
    <span class="photo-count" id="photoCount"></span>
    <button class="clear-btn" id="clearBtn" onclick="clearAll()">
      <i class="ti ti-trash" aria-hidden="true"></i> Clear all
    </button>
  </div>

  <div class="gallery-grid" id="galleryGrid"></div>

  <div class="empty-state" id="emptyState" style="display:flex;">
    <i class="ti ti-photo-off" aria-hidden="true"></i>
    <p>No photos yet — add some from your gallery!</p>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">
    <i class="ti ti-x" aria-hidden="true"></i>
  </button>
  <img id="lightboxImg" src="" alt="Full size photo" />
</div>

<div class="success-toast" id="toast"></div>

<script>
  const fileInput = document.getElementById('fileInput');
  const grid = document.getElementById('galleryGrid');
  const emptyState = document.getElementById('emptyState');
  const toolbar = document.getElementById('toolbar');
  const photoCount = document.getElementById('photoCount');
  const clearBtn = document.getElementById('clearBtn');
  const dropZone = document.getElementById('dropZone');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');

  let photos = [];

  fileInput.addEventListener('change', function(e) {
    handleFiles(Array.from(e.target.files));
    fileInput.value = '';
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
  });

  function handleFiles(files) {
    if (!files.length) return;
    let loaded = 0;
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = function(e) {
        photos.push({ src: e.target.result, name: file.name });
        loaded++;
        if (loaded === files.length) {
          renderGallery();
          showToast(files.length === 1 ? '1 photo added!' : files.length + ' photos added!');
        }
      };
      reader.readAsDataURL(file);
    });
  }

  function renderGallery() {
    grid.innerHTML = '';
    if (photos.length === 0) {
      emptyState.style.display = 'flex';
      toolbar.style.display = 'none';
      return;
    }
    emptyState.style.display = 'none';
    toolbar.style.display = 'flex';
    clearBtn.style.display = 'flex';
    photoCount.textContent = photos.length + ' photo' + (photos.length !== 1 ? 's' : '');

    photos.forEach((photo, idx) => {
      const item = document.createElement('div');
      item.className = 'photo-item';
      item.innerHTML = `
        <img src="${photo.src}" alt="${photo.name}" loading="lazy" />
        <button class="delete-btn" onclick="deletePhoto(${idx})" aria-label="Delete photo">
          <i class="ti ti-trash" aria-hidden="true"></i>
        </button>
      `;
      item.querySelector('img').addEventListener('click', () => openLightbox(photo.src));
      grid.appendChild(item);
    });
  }

  function deletePhoto(idx) {
    photos.splice(idx, 1);
    renderGallery();
    showToast('Photo removed');
  }

  function clearAll() {
    if (photos.length === 0) return;
    photos = [];
    renderGallery();
    showToast('All photos cleared');
  }

  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add('open');
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  }

  lightbox.addEventListener('click', function(e) {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });

  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = '✓ ' + msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }
</script>
